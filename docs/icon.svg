<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Корпус кассеты -->
  <rect x="3" y="5" width="58" height="54" rx="4" fill="#94a3b8"/>
  <rect x="5" y="7" width="54" height="50" rx="3" fill="#cbd5e1"/>

  <!-- Окно с плёнкой -->
  <rect x="9" y="11" width="46" height="30" rx="3" fill="#1e3a5f"/>

  <!-- Левая катушка -->
  <circle cx="23" cy="26" r="11" fill="#334d66"/>
  <line x1="23" y1="15" x2="23" y2="37" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="12.5" y1="20.5" x2="33.5" y2="31.5" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="12.5" y1="31.5" x2="33.5" y2="20.5" stroke="#1e3a5f" stroke-width="1.5"/>
  <circle cx="23" cy="26" r="5" fill="#1e3a5f"/>
  <circle cx="23" cy="26" r="2.5" fill="#60a5fa"/>

  <!-- Правая катушка -->
  <circle cx="41" cy="26" r="11" fill="#334d66"/>
  <line x1="41" y1="15" x2="41" y2="37" stroke="#1e3a5f" stroke-width="1.5"/>
  <line x1="30.5" y1="20.5" x2="51.5" y2="31.5" stroke="#1e3a5f" stroke-width="1.5"/>
