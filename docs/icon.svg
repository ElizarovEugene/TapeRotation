  <circle cx="41" cy="26" r="5" fill="#1e3a5f"/>
  <circle cx="41" cy="26" r="2.5" fill="#60a5fa"/>

  <!-- Плёнка -->
  <path d="M 10 38 Q 23 44 32 44 Q 41 44 54 38" stroke="#60a5fa" stroke-width="1.4" fill="none"/>

  <!-- Нижняя панель -->
  <rect x="9" y="43" width="46" height="12" rx="2" fill="#f8fafc"/>
  <rect x="12" y="46" width="20" height="2" rx="1" fill="#94a3b8"/>
  <rect x="12" y="50" width="14" height="2" rx="1" fill="#cbd5e1"/>

  <!-- Переключатель защиты -->
  <rect x="56" y="22" width="5" height="8" rx="1.5" fill="#64748b"/>
  <rect x="57" y="24" width="3" height="3" rx="0.5" fill="#cbd5e1"/>
